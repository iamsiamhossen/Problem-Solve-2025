<!DOCTYPE html>
<html>
<head>
  <title>Hover Animation Box</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background-color: blue;
      transition: all 0.5s ease; /* Smooth transition */
    }

    .box:hover {
      background-color: green;  /* Change color on hover */
      transform: rotate(45deg); /* Rotate 45 degrees */
    }
  </style>
</head>
<body>

<h2>Hover over the box:</h2>
<div class="box"></div>

</body>
</html>
